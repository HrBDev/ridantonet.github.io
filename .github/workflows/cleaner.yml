# ============================================================
# cleaner.yml — Auto-Cleanup Expired Downloads
# For: khashayar.one | Repository: khashayardev.github.io
# Policy: Delete videos older than 5 minutes
# ============================================================

name: "🗑 Cleanup Expired Videos"

on:
  # اجرای دوره‌ای: هر ۱۰ دقیقه
  schedule:
    - cron: "*/10 * * * *"
  
  # اجرای دستی
  workflow_dispatch:
    inputs:
      confirm:
        description: "⚠️ This will delete ALL videos in the /videos folder"
        required: false
        type: boolean
        default: false
  
  # اجرا پس از اتمام workflow دانلود
  workflow_run:
    workflows: ["🎬 Khashayar YouTube Downloader"]
    types:
      - completed

# ──────────────────────────────────────────────
# Environment Variables
# ──────────────────────────────────────────────
env:
  MAX_AGE_MINUTES: 5
  PROJECT_NAME: "Khashayar Cleaner"
  PROJECT_URL: "https://khashayar.one"

# ──────────────────────────────────────────────
# Main Job
# ──────────────────────────────────────────────
jobs:
  cleanup:
    name: "🧹 Clean Expired Files"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      actions: read

    steps:
      # ── Step 1: Checkout Repository ─────────────────────
      - name: "📥 Checkout Repository"
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: ${{ github.ref_name || 'main' }}

      # ── Step 2: Git Configuration ───────────────────────
      - name: "⚙️ Configure Git"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "✅ Git configured"

      # ── Step 3: Check if videos folder exists ────────────
      - name: "🔍 Check Videos Folder"
        id: check
        run: |
          if [ ! -d "videos" ]; then
            echo "📁 No videos folder found. Nothing to clean."
            echo "HAS_VIDEOS=false" >> $GITHUB_ENV
            exit 0
          fi
          
          # Count files (excluding .gitkeep and README.md)
          VIDEO_COUNT=$(find videos -type f ! -name '.gitkeep' ! -name 'README.md' 2>/dev/null | wc -l)
          
          if [ "$VIDEO_COUNT" -eq 0 ]; then
            echo "📁 Videos folder is empty. Nothing to clean."
            echo "HAS_VIDEOS=false" >> $GITHUB_ENV
            exit 0
          fi
          
          echo "📁 Found $VIDEO_COUNT file(s) in videos/"
          echo "HAS_VIDEOS=true" >> $GITHUB_ENV
          echo "VIDEO_COUNT=$VIDEO_COUNT" >> $GITHUB_ENV

      # ── Step 4: Check Commit Age ────────────────────────
      - name: "⏱️ Check File Ages"
        id: age_check
        if: env.HAS_VIDEOS == 'true'
        run: |
          echo "🔍 Checking file ages..."
          echo ""
          
          # Get the timestamp of the last commit to videos/
          LAST_COMMIT_TIME=$(git log -1 --format="%ct" -- videos/ 2>/dev/null || echo "0")
          CURRENT_TIME=$(date +%s)
          AGE_SECONDS=$(( CURRENT_TIME - LAST_COMMIT_TIME ))
          AGE_MINUTES=$(( AGE_SECONDS / 60 ))
          
          echo "  • Last commit: $(date -d @${LAST_COMMIT_TIME} '+%Y-%m-%d %H:%M:%S' 2>/dev/null || echo 'unknown')"
          echo "  • Current time: $(date '+%Y-%m-%d %H:%M:%S')"
          echo "  • Age: ${AGE_MINUTES} minute(s)"
          echo ""
          
          if [ "$AGE_MINUTES" -lt "$MAX_AGE_MINUTES" ] && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "⏳ Files are newer than ${MAX_AGE_MINUTES} minutes. Skipping cleanup."
            echo "SHOULD_CLEAN=false" >> $GITHUB_ENV
          else
            echo "🗑 Files are ${AGE_MINUTES} minute(s) old. Proceeding with cleanup."
            echo "SHOULD_CLEAN=true" >> $GITHUB_ENV
          fi
          
          # For manual trigger, always clean
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.confirm }}" = "true" ]; then
            echo "🔧 Manual cleanup triggered. Force cleaning all files."
            echo "SHOULD_CLEAN=true" >> $GITHUB_ENV
            echo "FORCE_CLEAN=true" >> $GITHUB_ENV
          fi

      # ── Step 5: Find Expired Folders ────────────────────
      - name: "🔎 Find Expired Downloads"
        id: find
        if: env.SHOULD_CLEAN == 'true'
        run: |
          echo "🔎 Scanning for expired downloads..."
          echo ""
          
          # Create a list of folders with their last commit time
          FOLDERS_TO_DELETE=""
          FOLDER_COUNT=0
          FILE_COUNT=0
          
          for folder in videos/*/; do
            [ -d "$folder" ] || continue
            
            FOLDER_NAME=$(basename "$folder")
            
            # Skip if it's just .gitkeep or empty
            if [ "$FOLDER_NAME" = ".gitkeep" ]; then
              continue
            fi
            
            # Get the last commit time for this specific folder
            LAST_COMMIT=$(git log -1 --format="%ct" -- "$folder" 2>/dev/null || echo "0")
            CURRENT_TIME=$(date +%s)
            AGE_SECONDS=$(( CURRENT_TIME - LAST_COMMIT ))
            AGE_MINUTES=$(( AGE_SECONDS / 60 ))
            
            echo "  📁 $FOLDER_NAME — ${AGE_MINUTES} min old"
            
            # Check if older than MAX_AGE_MINUTES or force clean
            if [ "$AGE_MINUTES" -ge "$MAX_AGE_MINUTES" ] || [ "${{ env.FORCE_CLEAN }}" = "true" ]; then
              FOLDERS_TO_DELETE="$FOLDERS_TO_DELETE $folder"
              FOLDER_COUNT=$((FOLDER_COUNT + 1))
              
              # Count files in this folder
              FILES_IN_FOLDER=$(find "$folder" -type f 2>/dev/null | wc -l)
              FILE_COUNT=$((FILE_COUNT + FILES_IN_FOLDER))
              
              echo "    ⏰ Marked for deletion"
            fi
          done
          
          echo ""
          echo "📊 Summary:"
          echo "  • Folders to delete: $FOLDER_COUNT"
          echo "  • Files to delete: $FILE_COUNT"
          echo ""
          
          echo "FOLDER_COUNT=$FOLDER_COUNT" >> $GITHUB_ENV
          echo "FILE_COUNT=$FILE_COUNT" >> $GITHUB_ENV
          
          if [ "$FOLDER_COUNT" -eq 0 ]; then
            echo "✅ No expired folders found."
            echo "HAS_EXPIRED=false" >> $GITHUB_ENV
          else
            echo "HAS_EXPIRED=true" >> $GITHUB_ENV
            # Save folder list
            echo "$FOLDERS_TO_DELETE" > /tmp/folders_to_delete.txt
          fi

      # ── Step 6: Delete Expired Folders ──────────────────
      - name: "🗑 Delete Expired Files"
        id: delete
        if: env.HAS_EXPIRED == 'true'
        run: |
          echo "🗑 Deleting expired downloads..."
          echo ""
          
          DELETED_COUNT=0
          
          while IFS= read -r folder; do
            [ -z "$folder" ] && continue
            [ ! -d "$folder" ] && continue
            
            FOLDER_NAME=$(basename "$folder")
            echo "  🗑 Deleting: $FOLDER_NAME"
            
            rm -rf "$folder"
            
            if [ ! -d "$folder" ]; then
              echo "    ✅ Deleted successfully"
              DELETED_COUNT=$((DELETED_COUNT + 1))
            else
              echo "    ❌ Failed to delete"
            fi
          done < /tmp/folders_to_delete.txt
          
          echo ""
          echo "✅ Deleted $DELETED_COUNT folder(s)"
          echo "DELETED_COUNT=$DELETED_COUNT" >> $GITHUB_ENV

      # ── Step 7: Update Master README ────────────────────
      - name: "📝 Update Videos README"
        id: update_readme
        if: env.DELETED_COUNT > '0' || env.HAS_EXPIRED == 'true'
        run: |
          echo "📝 Updating videos/README.md..."
          
          # Ensure videos directory exists
          mkdir -p videos
          
          # Count remaining videos
          REMAINING=$(find videos -mindepth 1 -maxdepth 1 -type d ! -name '.gitkeep' 2>/dev/null | wc -l)
          
          cat > videos/README.md << EOF
# 📁 Downloaded Videos

---

## 📊 Status

| Info | Value |
|------|-------|
| **Active Downloads** | ${REMAINING} |
| **Auto-Cleanup** | After ${MAX_AGE_MINUTES} minutes |
| **Last Checked** | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |

---

## 📋 Current Videos

EOF
          
          if [ "$REMAINING" -gt 0 ]; then
            echo "| # | Name | Link |" >> videos/README.md
            echo "|---|------|------|" >> videos/README.md
            
            INDEX=0
            for folder in videos/*/; do
              [ -d "$folder" ] || continue
              FOLDER_NAME=$(basename "$folder")
              [ "$FOLDER_NAME" = ".gitkeep" ] && continue
              
              INDEX=$((INDEX + 1))
              REPO_OWNER="${{ github.repository_owner }}"
              REPO_NAME="${{ github.event.repository.name }}"
              BRANCH="${{ github.ref_name || 'main' }}"
              
              echo "| $INDEX | \`$FOLDER_NAME\` | [View](https://github.com/${REPO_OWNER}/${REPO_NAME}/tree/${BRANCH}/videos/${FOLDER_NAME}) |" >> videos/README.md
            done
          else
            echo "> 📭 No downloads yet. Use [khashayar.one](https://khashayar.one) to download videos." >> videos/README.md
          fi
          
          cat >> videos/README.md << EOF

---

*Managed by [khashayar.one](https://khashayar.one) Auto-Cleaner*
EOF
          
          echo "✅ README updated (${REMAINING} video(s) remaining)"

      # ── Step 8: Commit and Push Changes ─────────────────
      - name: "📤 Commit & Push"
        id: push
        if: env.DELETED_COUNT > '0' || env.HAS_EXPIRED == 'true'
        run: |
          echo "📤 Committing changes..."
          
          # Force add videos directory (it's in .gitignore)
          git add -f videos/
          
          # Check if there are changes
          if git diff --cached --quiet; then
            echo "✅ No changes to commit"
            exit 0
          fi
          
          # Commit message based on context
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            COMMIT_MSG="[khashayar.one] 🗑 Manual cleanup: removed ${{ env.DELETED_COUNT }} expired download(s) [skip ci]"
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            COMMIT_MSG="[khashayar.one] ⏰ Scheduled cleanup: removed ${{ env.DELETED_COUNT }} expired download(s) [skip ci]"
          else
            COMMIT_MSG="[khashayar.one] 🔄 Auto-cleanup: removed ${{ env.DELETED_COUNT }} expired download(s) [skip ci]"
          fi
          
          # Amend or create commit
          git commit --amend -m "$COMMIT_MSG" 2>/dev/null || git commit -m "$COMMIT_MSG" --quiet
          
          # Push with retry
          RETRY=0
          MAX_RETRIES=5
          
          while [ $RETRY -lt $MAX_RETRIES ]; do
            RETRY=$((RETRY + 1))
            
            if timeout 60 git push --force origin HEAD:"${{ github.ref_name || 'main' }}" 2>&1; then
              echo "✅ Push successful (attempt $RETRY)"
              break
            else
              echo "❌ Push failed (attempt $RETRY/$MAX_RETRIES)"
              
              if [ $RETRY -ge $MAX_RETRIES ]; then
                echo "🚫 All push attempts failed"
                exit 1
              fi
              
              sleep $((2 + RANDOM % 5))
              git fetch origin "${{ github.ref_name || 'main' }}" --quiet
              git reset --hard origin/"${{ github.ref_name || 'main' }}" --quiet
              git add -f videos/
              git commit -m "$COMMIT_MSG" --quiet || true
            fi
          done

      # ── Step 9: Summary ─────────────────────────────────
      - name: "📊 Cleanup Summary"
        if: always()
        run: |
          echo ""
          echo "════════════════════════════════════════════"
          echo "  📊 Cleanup Summary"
          echo "════════════════════════════════════════════"
          echo ""
          echo "  • Event: ${{ github.event_name }}"
          echo "  • Files checked: ${{ env.VIDEO_COUNT || '0' }}"
          echo "  • Files deleted: ${{ env.DELETED_COUNT || '0' }}"
          echo "  • Folders removed: ${{ env.FOLDER_COUNT || '0' }}"
          echo "  • Remaining: $(find videos -type f ! -name '.gitkeep' ! -name 'README.md' 2>/dev/null | wc -l)"
          echo ""
          echo "  🌐 $PROJECT_URL"
          echo "════════════════════════════════════════════"

      # ── Step 10: Cleanup Git History (Optional) ─────────
      - name: "📦 Optimize Repository Size"
        if: env.DELETED_COUNT > '0'
        run: |
          echo "📦 Checking repository size..."
          
          # Get approximate size of .git directory
          GIT_SIZE=$(du -sh .git 2>/dev/null | cut -f1 || echo "unknown")
          echo "  • Git directory size: $GIT_SIZE"
          
          # If git directory is large, suggest manual gc
          # (Automatic gc can be risky in CI)
          if [ -d ".git" ]; then
            GIT_SIZE_KB=$(du -sk .git 2>/dev/null | cut -f1 || echo "0")
            if [ "$GIT_SIZE_KB" -gt 500000 ]; then
              echo "  ⚠️ Repository is large (${GIT_SIZE_KB}KB). Consider running:"
              echo "     git gc --aggressive --prune=now"
              echo "     (Must be done manually for safety)"
            else
              echo "  ✅ Repository size is acceptable"
            fi
          fi
