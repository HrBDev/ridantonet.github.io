name: 🚀 Deploy Secure Dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Inject GitHub Token (Python method)
        shell: python
        run: |
          import os
          import re
          
          token = os.environ['DASHBOARD_TOKEN']
          
          with open('index.html', 'r', encoding='utf-8') as f:
              content = f.read()
          
          # جایگزینی placeholder با توکن واقعی
          if "GITHUB_TOKEN_PLACEHOLDER" in content:
              content = content.replace("GITHUB_TOKEN_PLACEHOLDER", token)
              print("✅ Token injected successfully using Python")
          else:
              print("⚠️ Placeholder not found, checking if token already exists...")
          
          # Verify
          if token in content:
              print("✅ Verification: Token is present in HTML")
          else:
              print("❌ ERROR: Token injection failed!")
              exit(1)
          
          with open('index.html', 'w', encoding='utf-8') as f:
              f.write(content)
          
          print("✅ File saved successfully")
        env:
          DASHBOARD_TOKEN: ${{ secrets.DASHBOARD_TOKEN }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
