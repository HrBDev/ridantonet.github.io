name: 🚀 Deploy Secure Dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: 🔐 Inject GitHub Token
        run: |
          sed -i "s|GITHUB_TOKEN_PLACEHOLDER|${{ secrets.DASHBOARD_TOKEN }}|g" index.html
          echo "✅ Token injected securely"
      
      - uses: actions/configure-pages@v4
      
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      
      - uses: actions/deploy-pages@v4
        id: deployment
