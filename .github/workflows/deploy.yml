name: "📄 Deploy with Token"

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Inject Token into index.html
        run: |
          # جایگزین کردن placeholder با توکن واقعی
          sed -i "s|__GITHUB_TOKEN_PLACEHOLDER__|${{ secrets.GH_PAT }}|g" index.html
      
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Inject GitHub token into index.html [skip ci]"
          git push origin main
