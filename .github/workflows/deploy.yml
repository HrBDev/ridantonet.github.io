name: Deploy Dashboard with Token

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Token
        run: |
          # جایگزینی توکن در فایل HTML
          sed -i "s|GITHUB_TOKEN_PLACEHOLDER|${{ secrets.DASHBOARD_TOKEN }}|g" index.html
          
          # حذف فایل‌های غیرضروری برای امنیت بیشتر
          rm -f README.md

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
