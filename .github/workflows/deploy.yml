name: "📄 Deploy with Token (Python method)"

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Inject token using Python
        run: |
          python3 << 'EOF'
          import os
          
          # Read the file
          with open('index.html', 'r', encoding='utf-8') as f:
              content = f.read()
          
          # Check if placeholder exists
          if '__GITHUB_TOKEN_PLACEHOLDER__' not in content:
              print("❌ Placeholder not found in index.html")
              exit(1)
          
          # Get token from environment
          token = os.environ.get('GH_PAT', '')
          if not token:
              print("❌ GH_PAT environment variable is empty")
              exit(1)
          
          # Replace placeholder
          new_content = content.replace('__GITHUB_TOKEN_PLACEHOLDER__', token)
          
          # Verify replacement
          if '__GITHUB_TOKEN_PLACEHOLDER__' in new_content:
              print("❌ Replacement failed - placeholder still exists")
              exit(1)
          
          # Write back
          with open('index.html', 'w', encoding='utf-8') as f:
              f.write(new_content)
          
          print(f"✅ Token injected successfully (length: {len(token)})")
          EOF
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || (git commit -m "chore: inject token [skip ci]" && git push origin main)
