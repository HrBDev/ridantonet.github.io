    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {

    @keyframes glow {

    @keyframes scaleIn {

    }

    @keyframes shimmer {

    }

    @keyframes glowRotate {
