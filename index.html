<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khashayar Downloader — Test Panel</title>
    
    <!-- Tailwind CSS v4 via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.0/dist/index.global.min.js"></script>
    
    <!-- Vazirmatn Font -->
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
    
    <style>
        body { font-family: 'Vazirmatn', sans-serif; background: #0f172a; color: #f1f5f9; min-height: 100vh; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.06); }
        .btn-primary { background: linear-gradient(135deg, #4f46e5, #6366f1); transition: all 0.3s; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(99,102,241,0.4); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .input-field { background: #1e293b; border: 2px solid #475569; border-radius: 12px; padding: 12px 16px; width: 100%; color: white; font-family: inherit; transition: all 0.2s; }
        .input-field:focus { border-color: #6366f1; outline: none; box-shadow: 0 0 0 4px rgba(99,102,241,0.1); }
        select.input-field { appearance: none; cursor: pointer; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner { animation: spin 0.8s linear infinite; }
        .result-card { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

@theme {
    --font-vazir: 'Vazirmatn', sans-serif;
    --color-brand-500: #6366f1;
    --color-brand-600: #4f46e5;
    --color-brand-700: #4338ca;
    --color-surface: #0f172a;
    --color-surface-light: #1e293b;
    --color-surface-lighter: #334155;
    --color-surface-border: #475569;
}
    </style>
</head>
<body class="flex items-center justify-center p-4">
    
    <div id="app" class="w-full max-w-lg mx-auto space-y-6">
        
        <!-- Header -->
        <div class="text-center space-y-2">
            <div class="text-4xl">🎬</div>
            <h1 class="text-2xl font-bold">Khashayar Downloader</h1>
            <p class="text-sm text-gray-400">تست مستقیم Workflow — لینک بده، کیفیت رو انتخاب کن، دانلود کن</p>
            <p class="text-xs text-yellow-500/70">⚠️ فایل‌ها ۵ دقیقه پس از دانلود خودکار حذف می‌شوند</p>
        </div>
        
        <!-- Form -->
        <div class="glass rounded-2xl p-6 space-y-4">
            
            <!-- URL Input -->
            <div>
                <label class="text-sm text-gray-300 mb-2 block">🔗 لینک ویدیو یوتیوب</label>
                <input type="text" id="urlInput" class="input-field" 
                       placeholder="https://www.youtube.com/watch?v=..." 
                       dir="ltr" autocomplete="off">
                <p id="urlError" class="text-red-400 text-xs mt-1 hidden"></p>
            </div>
            
            <!-- Options Row -->
            <div class="grid grid-cols-2 gap-3">
                <!-- Quality -->
                <div>
                    <label class="text-sm text-gray-300 mb-2 block">🎬 کیفیت</label>
                    <select id="qualitySelect" class="input-field">
                        <option value="best">بهترین</option>
                        <option value="2160">4K</option>
                        <option value="1080">1080p</option>
                        <option value="720">720p</option>
                        <option value="480">480p</option>
                        <option value="audio">فقط صدا (MP3)</option>
                    </select>
                </div>
                
                <!-- Subtitles Toggle -->
                <div>
                    <label class="text-sm text-gray-300 mb-2 block">📝 زیرنویس</label>
                    <button id="subBtn" onclick="toggleSub()" 
                            class="input-field text-left cursor-pointer flex items-center justify-between">
                        <span id="subLabel">خاموش</span>
                        <span id="subDot" class="w-3 h-3 rounded-full bg-gray-500"></span>
                    </button>
                </div>
            </div>
            
            <!-- Password -->
            <div>
                <label class="text-sm text-gray-300 mb-2 block">🔒 رمز فایل (اختیاری)</label>
                <input type="text" id="passInput" class="input-field" 
                       placeholder="رمز دلخواه برای فایل ZIP" dir="ltr">
            </div>
            
            <!-- Submit -->
            <button id="submitBtn" onclick="startDownload()" 
                    class="btn-primary w-full py-4 rounded-xl text-lg font-semibold">
                <span id="btnText">🚀 شروع دانلود</span>
                <span id="btnSpinner" class="spinner hidden ml-2 inline-block w-5 h-5 border-2 border-white border-t-transparent rounded-full"></span>
            </button>
        </div>
        
        <!-- Status -->
        <div id="statusBox" class="glass rounded-2xl p-5 text-center hidden result-card">
            <div id="statusIcon" class="text-4xl mb-2"></div>
            <div id="statusText" class="text-lg font-semibold"></div>
            <div id="statusSub" class="text-sm text-gray-400 mt-1"></div>
            <div id="downloadArea" class="mt-4 hidden">
                <a id="downloadLink" href="#" target="_blank" 
                   class="inline-block bg-green-600 hover:bg-green-500 text-white px-6 py-3 rounded-xl font-semibold transition">
                    ⬇️ دانلود فایل
                </a>
                <p class="text-xs text-yellow-500/70 mt-3">⚠️ این فایل ۵ دقیقه دیگر حذف می‌شود</p>
            </div>
        </div>
        
        <!-- Footer -->
        <p class="text-center text-xs text-gray-500">Powered by <a href="https://khashayar.one" class="text-brand-500">khashayar.one</a></p>
    </div>

    <script>
        // ⚙️ Configuration
        const CONFIG = {
            owner: 'khashayardev',
            repo: 'khashayardev.github.io',
            workflowId: 'yt-dl.yml',
            branch: 'main',
            pollInterval: 5000,
            maxPollAttempts: 120
        };
        
        // State
        let subtitleEnabled = false;
        let isRunning = false;
        let pollTimer = null;
        
        // Toggle subtitle
        function toggleSub() {
            subtitleEnabled = !subtitleEnabled;
            document.getElementById('subLabel').textContent = subtitleEnabled ? 'روشن' : 'خاموش';
            document.getElementById('subDot').className = 'w-3 h-3 rounded-full ' + 
                (subtitleEnabled ? 'bg-green-500 shadow-lg shadow-green-500/50' : 'bg-gray-500');
        }
        
        // Validate YouTube URL
        function isValidYouTubeUrl(url) {
            const patterns = [
                /^https?:\/\/(www\.)?youtube\.com\/watch\?v=[\w-]{11}/,
                /^https?:\/\/youtu\.be\/[\w-]{11}/,
                /^https?:\/\/(www\.)?youtube\.com\/shorts\/[\w-]{11}/
            ];
            return patterns.some(p => p.test(url.trim()));
        }
        
        // Show error on URL input
        function showUrlError(msg) {
            const el = document.getElementById('urlError');
            el.textContent = msg;
            el.classList.remove('hidden');
            document.getElementById('urlInput').style.borderColor = '#ef4444';
        }
        
        function clearUrlError() {
            document.getElementById('urlError').classList.add('hidden');
            document.getElementById('urlInput').style.borderColor = '#475569';
        }
        
        // Show status
        function showStatus(icon, title, sub = '', showDownload = false, downloadUrl = '') {
            const box = document.getElementById('statusBox');
            box.classList.remove('hidden');
            document.getElementById('statusIcon').textContent = icon;
            document.getElementById('statusText').textContent = title;
            document.getElementById('statusSub').textContent = sub;
            
            const downloadArea = document.getElementById('downloadArea');
            if (showDownload && downloadUrl) {
                downloadArea.classList.remove('hidden');
                document.getElementById('downloadLink').href = downloadUrl;
            } else {
                downloadArea.classList.add('hidden');
            }
        }
        
        // Get GitHub Token (from URL param, localStorage, or prompt)
        function getToken() {
            // Check URL param
            const params = new URLSearchParams(window.location.search);
            if (params.get('token')) return params.get('token');
            
            // Check localStorage
            const stored = localStorage.getItem('gh_token_test');
            if (stored) return stored;
            
            // Ask user
            const token = prompt(
                '🔑 GitHub Personal Access Token required\n\n' +
                'Create one at: https://github.com/settings/tokens\n' +
                'Scopes needed: repo, workflow\n\n' +
                'Enter your token:'
            );
            
            if (token) {
                localStorage.setItem('gh_token_test', token);
                return token;
            }
            return null;
        }
        
        // Trigger workflow
        async function dispatchWorkflow(token, url, quality, subtitles, password) {
            const endpoint = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/actions/workflows/${CONFIG.workflowId}/dispatches`;
            
            const response = await fetch(endpoint, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    ref: CONFIG.branch,
                    inputs: {
                        youtube_urls: url,
                        quality: quality,
                        download_subtitles: subtitles ? 'true' : 'false',
                        password: password || '',
                    }
                })
            });
            
            if (response.status === 204) return true;
            
            const error = await response.json().catch(() => ({}));
            throw new Error(error.message || `HTTP ${response.status}`);
        }
        
        // Get latest workflow run
        async function getLatestRun(token) {
            const endpoint = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/actions/runs?branch=${CONFIG.branch}&per_page=1`;
            
            const response = await fetch(endpoint, {
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Accept': 'application/vnd.github.v3+json',
                }
            });
            
            const data = await response.json();
            return data.workflow_runs?.[0] || null;
        }
        
        // Get video download URL
        function getVideoUrl(folderName) {
            return `https://raw.githubusercontent.com/${CONFIG.owner}/${CONFIG.repo}/${CONFIG.branch}/videos/${encodeURIComponent(folderName)}/${encodeURIComponent(folderName)}.mp4`;
        }
        
        // Main download function
        async function startDownload() {
            if (isRunning) return;
            
            const url = document.getElementById('urlInput').value.trim();
            clearUrlError();
            
            // Validation
            if (!url) { showUrlError('لینک یوتیوب را وارد کنید'); return; }
            if (!isValidYouTubeUrl(url)) { showUrlError('لینک یوتیوب معتبر نیست'); return; }
            
            const token = getToken();
            if (!token) { showStatus('🔑', 'توکن لازم است', 'بدون توکن نمی‌توان دانلود کرد'); return; }
            
            const quality = document.getElementById('qualitySelect').value;
            const password = document.getElementById('passInput').value.trim();
            
            // Start
            isRunning = true;
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            document.getElementById('btnText').textContent = 'در حال ارسال...';
            document.getElementById('btnSpinner').classList.remove('hidden');
            
            showStatus('📤', 'در حال ارسال درخواست...', 'اتصال به GitHub API');
            
            try {
                // Step 1: Dispatch
                await dispatchWorkflow(token, url, quality, subtitleEnabled, password);
                
                showStatus('⏳', 'دانلود شروع شد', 'در حال دریافت ویدیو از یوتیوب...');
                document.getElementById('btnText').textContent = 'در حال دانلود...';
                
                // Step 2: Poll for completion
                let attempts = 0;
                let lastRunId = null;
                
                await new Promise((resolve, reject) => {
                    pollTimer = setInterval(async () => {
                        try {
                            attempts++;
                            const run = await getLatestRun(token);
                            
                            if (run && run.id !== lastRunId) {
                                lastRunId = run.id;
                                console.log(`Poll #${attempts}: ${run.status} / ${run.conclusion}`);
                            }
                            
                            if (run && run.status === 'completed') {
                                clearInterval(pollTimer);
                                if (run.conclusion === 'success') {
                                    resolve(run);
                                } else {
                                    reject(new Error('Workflow failed'));
                                }
                                return;
                            }
                            
                            if (attempts >= CONFIG.maxPollAttempts) {
                                clearInterval(pollTimer);
                                reject(new Error('Timeout'));
                            }
                        } catch (e) {
                            // Network errors are okay during polling
                            console.warn('Poll error:', e.message);
                        }
                    }, CONFIG.pollInterval);
                });
                
                // Step 3: Success — get the video URL
                // The folder name is the sanitized title. We'll fetch it from the repo.
                const filesUrl = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/videos`;
                const filesResponse = await fetch(filesUrl, {
                    headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github.v3+json' }
                });
                const files = await filesResponse.json();
                
                if (!Array.isArray(files) || files.length === 0) {
                    throw new Error('No files found in videos/');
                }
                
                // Get the last folder (most recent download)
                const lastFolder = files.filter(f => f.type === 'dir').pop();
                if (!lastFolder) throw new Error('No video folder found');
                
                const videoUrl = getVideoUrl(lastFolder.name);
                
                showStatus('✅', 'ویدیو آماده است!', `پوشه: ${lastFolder.name}`, true, videoUrl);
                document.getElementById('btnText').textContent = '✅ دانلود مجدد';
                document.getElementById('btnSpinner').classList.add('hidden');
                
                // Start countdown for 5-minute expiry
                startExpiryTimer();
                
            } catch (error) {
                console.error('Download error:', error);
                
                let msg = 'خطا در دانلود';
                if (error.message.includes('401') || error.message.includes('Bad credentials')) {
                    msg = 'توکن نامعتبر است';
                    localStorage.removeItem('gh_token_test');
                } else if (error.message.includes('403') || error.message.includes('rate limit')) {
                    msg = 'محدودیت نرخ — چند دقیقه صبر کنید';
                } else if (error.message.includes('Timeout')) {
                    msg = 'زمان دانلود طولانی شد — دوباره تلاش کنید';
                } else if (error.message.includes('Workflow failed')) {
                    msg = 'دانلود ناموفق — لینک را بررسی کنید';
                }
                
                showStatus('❌', msg, error.message);
                document.getElementById('btnText').textContent = '🔄 تلاش مجدد';
                document.getElementById('btnSpinner').classList.add('hidden');
            } finally {
                isRunning = false;
                btn.disabled = false;
            }
        }
        
        // 5-minute expiry timer
        function startExpiryTimer() {
            let seconds = 300;
            const sub = document.getElementById('statusSub');
            
            const timer = setInterval(() => {
                seconds--;
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                sub.textContent = `⏱ ${mins}:${secs.toString().padStart(2, '0')} تا حذف خودکار`;
                
                if (seconds <= 0) {
                    clearInterval(timer);
                    sub.textContent = '🗑 فایل حذف شد';
                    document.getElementById('downloadLink').classList.add('opacity-50', 'pointer-events-none');
                }
            }, 1000);
        }
        
        // Enter key to submit
        document.getElementById('urlInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') startDownload();
        });
        
        // Real-time URL validation
        document.getElementById('urlInput').addEventListener('input', function() {
            if (this.value.trim() && !isValidYouTubeUrl(this.value)) {
                this.style.borderColor = '#f59e0b';
            } else {
                this.style.borderColor = '#475569';
                clearUrlError();
            }
        });
    </script>
</body>
</html>
