<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>یوتوب دانلودر khashayar.one</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', sans-serif;
        }
        body {
            background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            margin: 0;
        }
        .card {
            max-width: 700px;
            width: 100%;
            background: rgba(18, 25, 45, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 2rem 1.8rem;
            box-shadow: 0 25px 45px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFF8E7, #FFD966);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            margin: 0 0 0.5rem;
        }
        .sub {
            text-align: center;
            color: #9aa9c7;
            border-bottom: 1px dashed #2a3650;
            padding-bottom: 0.8rem;
            margin-bottom: 1.8rem;
        }
        .form-group { margin-bottom: 1.4rem; }
        label {
            display: block;
            font-weight: 600;
            color: #e2e9ff;
            margin-bottom: 0.4rem;
            font-size: 0.9rem;
        }
        input, select, textarea {
            width: 100%;
            padding: 0.9rem 1rem;
            background: #0f1422;
            border: 1px solid #2a3455;
            border-radius: 1.2rem;
            color: white;
            font-size: 1rem;
            outline: none;
        }
        textarea {
            resize: vertical;
            font-family: monospace;
            direction: ltr;
        }
        .row2 {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .row2 .form-group { flex: 1; }
        button {
            background: linear-gradient(90deg, #f0a500, #f7b32b);
            border: none;
            padding: 1rem;
            width: 100%;
            border-radius: 3rem;
            font-weight: bold;
            font-size: 1.2rem;
            color: #0a0e1a;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 0.5rem;
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .progress-area {
            background: #0b0f18;
            border-radius: 1.5rem;
            padding: 1.2rem;
            margin: 1.5rem 0;
        }
        .progress-bar-container {
            background: #1e263b;
            border-radius: 1rem;
            height: 1.2rem;
            overflow: hidden;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #f7b32b, #ffd966);
            border-radius: 1rem;
            transition: width 0.3s ease;
        }
        .status-text {
            display: flex;
            justify-content: space-between;
            color: #b9c3e6;
            margin-top: 0.6rem;
            font-size: 0.85rem;
        }
        .download-link {
            background: #0f1625;
            padding: 1rem;
            border-radius: 1.5rem;
            margin-top: 1rem;
            text-align: center;
        }
        .error {
            color: #ff9e8f;
            background: #3a1e1a;
            padding: 0.6rem;
            border-radius: 1rem;
            text-align: center;
        }
        .success { color: #a3f0b0; }
        footer {
            font-size: 0.7rem;
            text-align: center;
            color: #4c5880;
            margin-top: 1.6rem;
        }
        a { color: #ffd966; text-decoration: none; }
        @media (max-width: 500px) {
            .card { padding: 1.5rem; }
            .row2 { flex-direction: column; gap: 0; }
        }
    </style>
</head>
<body>
<div class="card">
    <h1>🎬 Khashayar Downloader</h1>
   <div class="sub">دانلود ویدیو از یوتیوب</div>

    <form id="downloadForm">
        <div class="form-group">
            <label>🔗 لینک یوتیوب</label>
            <textarea id="urls" rows="2" placeholder="https://youtu.be/...&#10;https://www.youtube.com/watch?v=..." required></textarea>
        </div>
        <div class="row2">
            <div class="form-group">
                <label>🎬 کیفیت</label>
                <select id="quality">
                    <option value="best">✨ بهترین</option>
                    <option value="2160">4K (2160p)</option>
                    <option value="1440">1440p (2K)</option>
                    <option value="1080">1080p</option>
                    <option value="720">720p</option>
                    <option value="480">480p</option>
                    <option value="audio">🎵 MP3</option>
                </select>
            </div>
            <div class="form-group">
                <label>📝 زیرنویس</label>
                <select id="subtitles">
                    <option value="false">خاموش</option>
                    <option value="true">روشن</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label>🔒 رمز ZIP (اختیاری)</label>
            <input type="text" id="password" placeholder="در صورت نیاز رمز">
        </div>

        <button type="submit" id="submitBtn">🚀 شروع دانلود</button>
    </form>

    <div id="progressBox" style="display: none;">
        <div class="progress-area">
            <div class="progress-bar-container">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="status-text">
                <span id="statusMsg">در حال ارسال درخواست...</span>
                <span id="percentLabel">0%</span>
            </div>
        </div>
        <div id="downloadBlock" style="display: none;" class="download-link">
            <div>✅ ویدیو آماده است!</div>
            <a id="directDownloadLink" href="#" target="_blank" style="display: inline-block; margin-top: 0.8rem; background: #2a3a60; padding: 0.6rem 1rem; border-radius: 2rem;">⬇️ دانلود فایل</a>
            <button type="button" id="resetBtn" style="background:#1e2a3a; margin-top: 0.5rem;">🔄 دانلود جدید</button>
        </div>
        <div id="errorBlock" style="display: none;" class="error"></div>
    </div>
    <footer>ساخته شده با ❤️ توسط Khashayar.one</footer>
</div>

<script>
    // API endpoint روی هاست شما
    const API_URL = 'https://khashayar.one/api/trigger.php';
    
    let pollingInterval = null;
    let currentRunId = null;

    const dom = {
        form: document.getElementById('downloadForm'),
        submitBtn: document.getElementById('submitBtn'),
        progressBox: document.getElementById('progressBox'),
        progressFill: document.getElementById('progressFill'),
        statusMsg: document.getElementById('statusMsg'),
        percentLabel: document.getElementById('percentLabel'),
        downloadBlock: document.getElementById('downloadBlock'),
        directDownloadLink: document.getElementById('directDownloadLink'),
        resetBtn: document.getElementById('resetBtn'),
        errorBlock: document.getElementById('errorBlock'),
        urls: document.getElementById('urls'),
        quality: document.getElementById('quality'),
        subtitles: document.getElementById('subtitles'),
        password: document.getElementById('password')
    };

    async function triggerDownload(payload) {
        const response = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        
        if (!response.ok) {
            const errorText = await response.text();
            throw new Error(errorText || 'خطا در ارتباط با سرور');
        }
        
        const data = await response.json();
        return data.run_id;
    }

    async function checkStatus(runId) {
        const response = await fetch(`${API_URL}?run_id=${runId}`);
        if (!response.ok) return null;
        return await response.json();
    }

    function startPolling(runId) {
        if (pollingInterval) clearInterval(pollingInterval);
        
        pollingInterval = setInterval(async () => {
            const status = await checkStatus(runId);
            if (!status) return;
            
            let percent = 10;
            if (status.status === 'in_progress') percent = 45;
            if (status.status === 'completed') percent = 100;
            
            dom.progressFill.style.width = `${percent}%`;
            dom.percentLabel.innerText = `${percent}%`;
            dom.statusMsg.innerText = status.message || 'در حال پردازش...';
            
            if (status.status === 'completed') {
                clearInterval(pollingInterval);
                if (status.success) {
                    await showDownloadLink();
                } else {
                    showError(status.error || 'خطا در دانلود');
                }
            }
        }, 3000);
    }

    async function showDownloadLink() {
        try {
            const response = await fetch(`${API_URL}?get_latest=true`);
            const data = await response.json();
            if (data.download_url) {
                dom.directDownloadLink.href = data.download_url;
                dom.downloadBlock.style.display = 'block';
                dom.statusMsg.innerText = '✅ آماده دانلود!';
                dom.progressFill.style.width = '100%';
                dom.percentLabel.innerText = '100%';
            } else {
                showError('فایل پیدا نشد');
            }
        } catch(err) {
            showError('خطا در دریافت لینک دانلود');
        }
    }

    function showError(msg) {
        dom.errorBlock.innerText = msg;
        dom.errorBlock.style.display = 'block';
        dom.downloadBlock.style.display = 'none';
        dom.statusMsg.innerText = 'خطا';
        if (pollingInterval) clearInterval(pollingInterval);
    }

    function resetUI() {
        if (pollingInterval) clearInterval(pollingInterval);
        currentRunId = null;
        dom.progressBox.style.display = 'none';
        dom.downloadBlock.style.display = 'none';
        dom.errorBlock.style.display = 'none';
        dom.progressFill.style.width = '0%';
        dom.percentLabel.innerText = '0%';
        dom.submitBtn.disabled = false;
    }

    dom.form.addEventListener('submit', async (e) => {
        e.preventDefault();
        resetUI();

        const urlsRaw = dom.urls.value.trim();
        if (!urlsRaw) {
            alert('لطفاً لینک یوتیوب را وارد کنید');
            return;
        }

        const urlList = urlsRaw.split(/\r?\n/).filter(u => u.trim().length > 0);
        
        const payload = {
            youtube_urls: urlList.join(' '),
            quality: dom.quality.value,
            download_subtitles: dom.subtitles.value === 'true',
            password: dom.password.value.trim()
        };

        dom.submitBtn.disabled = true;
        dom.progressBox.style.display = 'block';
        dom.statusMsg.innerText = '🚀 در حال ارسال درخواست...';
        dom.progressFill.style.width = '5%';
        dom.percentLabel.innerText = '5%';

        try {
            const runId = await triggerDownload(payload);
            currentRunId = runId;
            startPolling(runId);
        } catch (err) {
            showError(err.message);
            dom.submitBtn.disabled = false;
        }
    });

    dom.resetBtn.addEventListener('click', () => {
        resetUI();
        dom.form.reset();
        dom.submitBtn.disabled = false;
    });
</script>
</body>
</html>
