<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 YouTube Downloader | داشبورد مدیریت</title>
    
    <!-- امنیت بیشتر -->
    <meta name="robots" content="noindex, nofollow">
    <meta http-equiv="X-Robots-Tag" content="noindex, nofollow">
    
    <style>
        /* === Git-Style Dark Theme === */
        :root {
            --bg: #0d1117;
            --card-bg: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --text-secondary: #8b949e;
            --accent: #f85149;
            --accent-hover: #ff6b6b;
            --success: #238636;
            --danger: #da3633;
            --warning: #d2991d;
            --info: #58a6ff;
            --input-bg: #0d1117;
            --shadow: 0 8px 24px rgba(0,0,0,0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Vazirmatn', Tahoma, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* === Animated Background === */
        .bg-pattern {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(ellipse at 20% 50%, rgba(248, 81, 73, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(248, 81, 73, 0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 920px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* === Header === */
        .header {
            text-align: center;
            padding: 50px 20px 40px;
            position: relative;
        }

        .header-logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #ff0000, #cc0000);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 2.5em;
            box-shadow: 0 10px 30px rgba(255, 0, 0, 0.3);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .header h1 {
            font-size: 2.5em;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #ff4444, #ff8888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 1.1em;
            max-width: 500px;
            margin: 0 auto;
        }

        .connection-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 15px;
            padding: 6px 14px;
            background: rgba(35, 134, 54, 0.1);
            border: 1px solid rgba(35, 134, 54, 0.3);
            border-radius: 20px;
            font-size: 0.85em;
            color: #3fb950;
        }

        .connection-status.dot { 
            width: 7px; height: 7px; 
            background: #3fb950; 
            border-radius: 50%; 
            animation: pulse-dot 2s infinite; 
        }

        @keyframes pulse-dot {
            0%, 100% { box-shadow: 0 0 0 0 rgba(63, 185, 80, 0.4); }
            50% { box-shadow: 0 0 0 8px rgba(63, 185, 80, 0); }
        }

        /* === Stats Grid === */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 12px;
            margin-bottom: 25px;
        }

        .stat-item {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 18px 15px;
            text-align: center;
            transition: all 0.3s;
            cursor: default;
        }

        .stat-item:hover {
            border-color: #444;
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .stat-icon { font-size: 1.5em; display: block; margin-bottom: 8px; }
        .stat-number { font-size: 1.8em; font-weight: 700; color: #fff; }
        .stat-label { font-size: 0.8em; color: var(--text-secondary); margin-top: 4px; }

        /* === Toast Notifications === */
        .toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            width: 90%;
            max-width: 500px;
        }

        .toast {
            padding: 14px 20px;
            border-radius: 10px;
            margin-bottom: 10px;
            font-weight: 500;
            font-size: 0.95em;
            animation: slideInDown 0.4s ease, fadeOut 0.3s ease 4.7s forwards;
            display: flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .toast.success { background: rgba(35, 134, 54, 0.9); border: 1px solid #238636; color: #fff; }
        .toast.error { background: rgba(218, 54, 51, 0.9); border: 1px solid #da3633; color: #fff; }
        .toast.warning { background: rgba(210, 153, 29, 0.9); border: 1px solid #d2991d; color: #fff; }
        .toast.info { background: rgba(88, 166, 255, 0.9); border: 1px solid #58a6ff; color: #fff; }

        @keyframes slideInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeOut {
            to { opacity: 0; transform: translateY(-10px); }
        }

        /* === Main Cards === */
        .main-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px;
            margin-bottom: 20px;
            transition: all 0.3s;
        }

        .main-card:hover { border-color: #444; }

        .card-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 22px;
            padding-bottom: 18px;
            border-bottom: 1px solid var(--border);
        }

        .card-icon-wrapper {
            width: 55px;
            height: 55px;
            background: rgba(248, 81, 73, 0.1);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8em;
            flex-shrink: 0;
        }

        .card-title-group h3 {
            font-size: 1.2em;
            color: #fff;
            margin-bottom: 4px;
        }

        .card-title-group .badge {
            display: inline-block;
            padding: 2px 10px;
            background: rgba(35, 134, 54, 0.15);
            border-radius: 10px;
            font-size: 0.75em;
            color: #3fb950;
        }

        /* === Form Elements === */
        .form-group { margin-bottom: 16px; }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: var(--text);
            font-weight: 500;
            font-size: 0.9em;
        }

        .form-group .subtitle {
            font-size: 0.78em;
            color: var(--text-secondary);
            margin-top: 3px;
        }

        .input-icon-wrapper {
            position: relative;
        }

        .input-icon-wrapper .input-icon {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 1.1em;
            pointer-events: none;
        }

        input, textarea, select {
            width: 100%;
            padding: 13px 40px 13px 14px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.2s;
        }

        textarea { padding-right: 14px; min-height: 70px; resize: vertical; }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(248, 81, 73, 0.1);
        }

        input::placeholder { color: #484f58; }

        /* === Buttons === */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 13px 24px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.25s;
            font-family: inherit;
            width: 100%;
            text-decoration: none;
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(transparent, rgba(255,255,255,0.05));
            opacity: 0;
            transition: opacity 0.3s;
        }

        .btn:hover::after { opacity: 1; }

        .btn-primary {
            background: linear-gradient(135deg, #d32f2f, #b71c1c);
            color: #fff;
            box-shadow: 0 4px 15px rgba(211, 47, 47, 0.3);
        }
        .btn-primary:hover {
            box-shadow: 0 6px 25px rgba(211, 47, 47, 0.5);
            transform: translateY(-1px);
        }
        .btn-primary:active { transform: scale(0.98); }

        .btn-danger {
            background: transparent;
            color: #f85149;
            border: 1px solid rgba(248, 81, 73, 0.3);
        }
        .btn-danger:hover { background: rgba(248, 81, 73, 0.1); }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        .btn .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid transparent;
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* === Runs History === */
        .runs-panel {
            margin-top: 18px;
            background: var(--bg);
            border-radius: 10px;
            padding: 14px;
            border: 1px solid var(--border);
        }

        .runs-panel h4 {
            font-size: 0.9em;
            color: var(--text);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .run-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 9px 10px;
            border-radius: 6px;
            font-size: 0.82em;
            transition: background 0.2s;
        }

        .run-row:hover { background: rgba(255,255,255,0.02); }

        .run-status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .run-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .run-dot.ok { background: #3fb950; }
        .run-dot.fail { background: #f85149; }
        .run-dot.progress { background: #d2991d; animation: blink 1.2s infinite; }
        .run-dot.hold { background: #8b949e; }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .run-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.85em;
            transition: color 0.2s;
        }
        .run-link:hover { color: var(--accent); }

        .empty-state {
            text-align: center;
            padding: 25px;
            color: var(--text-secondary);
        }
        .empty-state .empty-icon { font-size: 2em; display: block; margin-bottom: 10px; }

        /* === Footer === */
        .footer-bar {
            text-align: center;
            padding: 25px;
            color: var(--text-secondary);
            font-size: 0.82em;
            border-top: 1px solid var(--border);
            margin-top: 30px;
        }
        .footer-bar a { color: var(--accent); text-decoration: none; }
        .footer-bar a:hover { text-decoration: underline; }

        /* === Responsive === */
        @media (max-width: 768px) {
            .header { padding: 30px 15px 25px; }
            .header h1 { font-size: 1.8em; }
            .header-logo { width: 60px; height: 60px; font-size: 2em; }
            .main-card { padding: 20px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .card-header { flex-direction: column; text-align: center; }
            .btn { padding: 11px 20px; font-size: 14px; }
            .toast-container { width: 95%; }
        }

        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: 1fr; }
            .card-icon-wrapper { width: 45px; height: 45px; font-size: 1.5em; }
        }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    
    <div class="toast-container" id="toastContainer"></div>

    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-logo">▶</div>
            <h1>YouTube Downloader</h1>
            <p>دانلود مستقیم ویدیوهای یوتیوب • سریع • امن • همیشه آنلاین</p>
            <div class="connection-status" id="connStatus">
                <span class="dot"></span>
                <span>متصل به سرور</span>
            </div>
        </header>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-item">
                <span class="stat-icon">🚀</span>
                <div class="stat-number" id="statTotal">-</div>
                <div class="stat-label">کل دانلودها</div>
            </div>
            <div class="stat-item">
                <span class="stat-icon">✅</span>
                <div class="stat-number" id="statSuccess">-</div>
                <div class="stat-label">موفق</div>
            </div>
            <div class="stat-item">
                <span class="stat-icon">⏱️</span>
                <div class="stat-number" id="statActive">-</div>
                <div class="stat-label">فعال</div>
            </div>
            <div class="stat-item">
                <span class="stat-icon">💾</span>
                <div class="stat-number" id="statStorage">-</div>
                <div class="stat-label">فضای مصرفی</div>
            </div>
        </div>

        <!-- Workflows Container -->
        <div id="workflowsContainer">
            <div class="main-card" style="text-align: center; padding: 50px;">
                <div class="spinner" style="margin: 0 auto 18px; width: 35px; height: 35px; border-top-color: #f85149; border-radius: 50%; border: 3px solid transparent; border-top: 3px solid #f85149; animation: spin 0.8s linear infinite;"></div>
                <p style="color: var(--text-secondary);">در حال بارگذاری ابزارها...</p>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer-bar">
            <p>قدرت گرفته از <a href="https://github.com/features/actions" target="_blank" rel="noopener">GitHub Actions</a> 
               • <a href="https://github.com/khashayardev/khashayardl" target="_blank" rel="noopener">مشاهده سورس</a></p>
        </div>
    </div>

    <script>
    (function() {
        'use strict';

        // =====================================================
        // 🔐 CONFIGURATION - توکن امن (از workflow تزریق میشه)
        // =====================================================
        const CONFIG = {
            GITHUB_USERNAME: 'khashayardev',
            GITHUB_REPO: 'khashayardl',
            // این مقدار توسط GitHub Actions جایگزین میشه
            GITHUB_TOKEN: 'GITHUB_TOKEN_PLACEHOLDER',
            BRANCH: 'main',
            REFRESH_INTERVAL: 30000 // 30 ثانیه
        };

        // =====================================================
        // 📡 API Client
        // =====================================================
        const api = {
            async request(endpoint, method = 'GET', body = null) {
                const url = `https://api.github.com/repos/${CONFIG.GITHUB_USERNAME}/${CONFIG.GITHUB_REPO}${endpoint}`;
                const headers = {
                    'Authorization': `Bearer ${CONFIG.GITHUB_TOKEN}`,
                    'Accept': 'application/vnd.github+json',
                    'User-Agent': 'UDL-Dashboard-Pro/3.0'
                };
                
                const options = { method, headers };
                if (body) {
                    headers['Content-Type'] = 'application/json';
                    options.body = JSON.stringify(body);
                }

                const res = await fetch(url, options);
                const code = res.status;
                const data = code === 204 ? null : await res.json();
                
                return { code, data, ok: code >= 200 && code < 300 };
            },

            workflows() {
                return this.request('/actions/workflows');
            },

            runs(workflowId, limit = 5) {
                return this.request(`/actions/workflows/${workflowId}/runs?per_page=${limit}`);
            },

            trigger(workflowId, inputs = {}) {
                return this.request(
                    `/actions/workflows/${workflowId}/dispatches`, 
                    'POST', 
                    { ref: CONFIG.BRANCH, inputs }
                );
            }
        };

        // =====================================================
        // 💬 Toast System
        // =====================================================
        const toast = {
            container: document.getElementById('toastContainer'),
            
            show(message, type = 'info', duration = 5000) {
                const el = document.createElement('div');
                el.className = `toast ${type}`;
                
                const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
                el.innerHTML = `${icons[type] || ''} ${this.escape(message)}`;
                
                this.container.appendChild(el);
                
                if (duration > 0) {
                    setTimeout(() => {
                        el.style.opacity = '0';
                        el.style.transform = 'translateY(-10px)';
                        el.style.transition = 'all 0.3s';
                        setTimeout(() => el.remove(), 300);
                    }, duration);
                }
                
                return el;
            },

            loading(message) {
                return this.show(message, 'info', 0);
            },

            escape(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
        };

        // =====================================================
        // 📊 Stats Manager
        // =====================================================
        const stats = {
            async update() {
                const workflowCards = document.querySelectorAll('[data-wf-id]');
                let total = 0, success = 0, active = 0;

                for (const card of workflowCards) {
                    const wfId = card.dataset.wfId;
                    const runsResult = await api.runs(wfId, 30);
                    if (runsResult.ok && runsResult.data?.workflow_runs) {
                        const runs = runsResult.data.workflow_runs;
                        total += runs.length;
                        success += runs.filter(r => r.conclusion === 'success').length;
                        active += runs.filter(r => r.status === 'in_progress' || r.status === 'queued').length;
                    }
                }

                document.getElementById('statTotal').textContent = total || '-';
                document.getElementById('statSuccess').textContent = success || '-';
                document.getElementById('statActive').textContent = active || '-';
                document.getElementById('statStorage').textContent = this.formatSize(total);
            },

            formatSize(count) {
                if (count === 0) return '-';
                const estimatedMB = count * 45; // تخمین ۴۵ مگابایت هر ویدیو
                if (estimatedMB > 1024) return (estimatedMB / 1024).toFixed(1) + ' GB';
                return estimatedMB + ' MB';
            }
        };

        // =====================================================
        // 🏗️ UI Builder
        // =====================================================
        const ui = {
            createWorkflowCard(wf) {
                const isDeleter = wf.name.toLowerCase().includes('delete') || 
                                wf.name.includes('حذف');
                
                const card = document.createElement('div');
                card.className = 'main-card';
                card.dataset.wfId = wf.id;

                card.innerHTML = `
                    <div class="card-header">
                        <div class="card-icon-wrapper">${isDeleter ? '🗑️' : '⬇️'}</div>
                        <div class="card-title-group">
                            <h3>${this.escape(wf.name)}</h3>
                            <span class="badge">● فعال</span>
                        </div>
                    </div>
                    
                    ${isDeleter ? this.deleteForm(wf.id) : this.downloadForm(wf.id)}
                    
                    <div class="runs-panel">
                        <h4>📋 تاریخچه اجرا</h4>
                        <div id="runsList_${wf.id}">
                            <div class="empty-state">
                                <span class="empty-icon">⏳</span>
                                در حال بارگذاری...
                            </div>
                        </div>
                    </div>
                `;

                return card;
            },

            downloadForm(wfId) {
                return `
                    <form id="form_${wfId}" onsubmit="return false;">
                        <div class="form-group">
                            <label>🔗 لینک ویدیو</label>
                            <div class="input-icon-wrapper">
                                <span class="input-icon">🎥</span>
                                <input type="url" id="input_${wfId}" 
                                       placeholder="https://www.youtube.com/watch?v=..." 
                                       required autocomplete="url">
                            </div>
                            <div class="subtitle">لینک کامل ویدیو را از نوار آدرس مرورگر کپی کنید</div>
                        </div>
                        <button type="submit" class="btn btn-primary" id="btn_${wfId}" 
                                onclick="window.dispatch.download('${wfId}')">
                            ⬇️ شروع دانلود
                        </button>
                    </form>
                `;
            },

            deleteForm(wfId) {
                return `
                    <button class="btn btn-danger" id="btn_${wfId}" 
                            onclick="window.dispatch.delete('${wfId}')">
                        🗑️ پاکسازی همه فایل‌ها
                    </button>
                `;
            },

            async updateRunsList(wfId) {
                const container = document.getElementById(`runsList_${wfId}`);
                if (!container) return;

                const result = await api.runs(wfId, 5);
                
                if (!result.ok || !result.data?.workflow_runs?.length) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <span class="empty-icon">📭</span>
                            هنوز اجرایی ثبت نشده
                        </div>`;
                    return;
                }

                container.innerHTML = result.data.workflow_runs.map(run => {
                    const isDone = run.status === 'completed';
                    const isSuccess = run.conclusion === 'success';
                    const dotClass = isDone ? (isSuccess ? 'ok' : 'fail') : 
                                    (run.status === 'in_progress' ? 'progress' : 'hold');
                    
                    const statusText = isDone ? (isSuccess ? 'موفق' : 'خطا') :
                                      (run.status === 'in_progress' ? 'درحال اجرا' : 'در صف');

                    const d = new Date(run.created_at);
                    const time = d.toLocaleTimeString('fa-IR', { hour: '2-digit', minute: '2-digit' });
                    const date = d.toLocaleDateString('fa-IR', { month: 'short', day: 'numeric' });

                    return `
                        <div class="run-row">
                            <div class="run-status-indicator">
                                <span class="run-dot ${dotClass}"></span>
                                <span>${statusText}</span>
                            </div>
                            <span>${date} ${time}</span>
                            <a href="${run.html_url}" target="_blank" rel="noopener" 
                               class="run-link" title="مشاهده در گیت‌هاب">↗</a>
                        </div>`;
                }).join('');
            },

            escape(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
        };

        // =====================================================
        // 🎯 Dispatcher
        // =====================================================
        window.dispatch = {
            async download(wfId) {
                const input = document.getElementById(`input_${wfId}`);
                const btn = document.getElementById(`btn_${wfId}`);
                const url = input?.value.trim();

                if (!url) {
                    toast.show('لطفاً لینک ویدیو را وارد کنید', 'warning');
                    input?.focus();
                    return;
                }

                if (!url.includes('youtube.com/watch') && !url.includes('youtu.be')) {
                    toast.show('لینک معتبر یوتیوب وارد کنید', 'warning');
                    return;
                }

                btn.disabled = true;
                btn.innerHTML = '<span class="spinner"></span> در حال ارسال...';
                
                const loadingToast = toast.loading('⏳ ارسال دستور به گیت‌هاب...');

                try {
                    const res = await api.trigger(wfId, { url });
                    
                    if (res.code === 204) {
                        toast.show('✅ دانلود آغاز شد! workflow در حال اجراست', 'success', 6000);
                        input.value = '';
                        setTimeout(() => ui.updateRunsList(wfId), 2000);
                        setTimeout(() => stats.update(), 3000);
                    } else {
                        throw new Error(res.data?.message || `کد خطا: ${res.code}`);
                    }
                } catch (err) {
                    toast.show(`❌ خطا: ${err.message}`, 'error', 7000);
                } finally {
                    loadingToast.remove();
                    btn.disabled = false;
                    btn.innerHTML = '⬇️ شروع دانلود';
                }
            },

            async delete(wfId) {
                if (!confirm('⚠️ هشدار: تمام فایل‌های دانلود شده برای همیشه حذف می‌شوند.\n\nمطمئن هستید؟')) {
                    return;
                }

                const btn = document.getElementById(`btn_${wfId}`);
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner"></span> در حال پاکسازی...';

                const loadingToast = toast.loading('⏳ ارسال دستور پاکسازی...');

                try {
                    const res = await api.trigger(wfId);
                    if (res.code === 204) {
                        toast.show('🗑️ عملیات پاکسازی آغاز شد', 'warning', 5000);
                        setTimeout(() => ui.updateRunsList(wfId), 2000);
                    } else {
                        throw new Error(res.data?.message || `کد خطا: ${res.code}`);
                    }
                } catch (err) {
                    toast.show(`❌ خطا: ${err.message}`, 'error', 7000);
                } finally {
                    loadingToast.remove();
                    btn.disabled = false;
                    btn.innerHTML = '🗑️ پاکسازی همه فایل‌ها';
                }
            }
        };

        // =====================================================
        // 🚀 Bootstrap
        // =====================================================
        async function boot() {
            try {
                // چک توکن
                if (CONFIG.GITHUB_TOKEN === 'GITHUB_TOKEN_PLACEHOLDER') {
                    document.getElementById('workflowsContainer').innerHTML = `
                        <div class="main-card" style="text-align: center; padding: 50px;">
                            <span style="font-size: 3em; display: block; margin-bottom: 20px;">🔒</span>
                            <h3 style="color: #f85149; margin-bottom: 12px;">تنظیمات امنیتی ناقص است</h3>
                            <p style="color: var(--text-secondary);">
                                لطفاً از روش امن (Workflow Deployment) برای استقرار استفاده کنید
                            </p>
                        </div>`;
                    document.getElementById('connStatus').innerHTML = 
                        '<span class="dot" style="background:#f85149;"></span><span>نیاز به تنظیمات</span>';
                    return;
                }

                // بارگذاری workflowها
                const wfResult = await api.workflows();
                const container = document.getElementById('workflowsContainer');

                if (!wfResult.ok || !wfResult.data?.workflows?.length) {
                    container.innerHTML = `
                        <div class="main-card" style="text-align: center; padding: 50px;">
                            <span style="font-size: 3em; display: block; margin-bottom: 20px;">📋</span>
                            <h3 style="color: var(--text); margin-bottom: 12px;">هیچ workflow‌ای پیدا نشد</h3>
                            <p style="color: var(--text-secondary);">
                                لطفاً workflowهای ریپازیتوری را بررسی کنید
                            </p>
                        </div>`;
                    return;
                }

                // ساخت UI
                container.innerHTML = '';
                wfResult.data.workflows.forEach(wf => {
                    container.appendChild(ui.createWorkflowCard(wf));
                    ui.updateRunsList(wf.id);
                });

                // آپدیت آمار
                stats.update();
                
                // رفرش دوره‌ای
                setInterval(() => {
                    document.querySelectorAll('[data-wf-id]').forEach(card => {
                        ui.updateRunsList(card.dataset.wfId);
                    });
                    stats.update();
                }, CONFIG.REFRESH_INTERVAL);

            } catch (err) {
                console.error('Boot error:', err);
                document.getElementById('workflowsContainer').innerHTML = `
                    <div class="main-card" style="text-align: center; padding: 50px;">
                        <span style="font-size: 3em; display: block; margin-bottom: 20px;">🔌</span>
                        <h3 style="color: #f85149; margin-bottom: 12px;">خطا در اتصال</h3>
                        <p style="color: var(--text-secondary);">${ui.escape(err.message)}</p>
                        <button onclick="location.reload()" class="btn btn-primary" style="margin-top: 15px; width: auto; padding: 10px 30px;">
                            🔄 تلاش مجدد
                        </button>
                    </div>`;
                document.getElementById('connStatus').innerHTML = 
                    '<span class="dot" style="background:#f85149;"></span><span>قطع اتصال</span>';
            }
        }

        // Start
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', boot);
        } else {
            boot();
        }
    })();
    </script>
</body>
</html>
