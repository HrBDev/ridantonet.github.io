<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khashayar YouTube Downloader</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <!-- Vazir Font -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/vazir-font/30.1.0/font-face.min.css" rel="stylesheet">
    <!-- SweetAlert2 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.15.10/sweetalert2.min.css" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0c1222 100%);
            font-family: 'vazirmatn', system-ui, sans-serif;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 650px;
            margin: 0 auto;
        }

        .card {
            background: rgba(18, 25, 45, 0.85);
            backdrop-filter: blur(16px);
            border-radius: 2rem;
            border: 1px solid rgba(255, 215, 0, 0.15);
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f5e6b0, #f7b32b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 0.5rem;
        }

        .sub {
            text-align: center;
            color: #9ca3af;
            font-size: 0.85rem;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #2d3748;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            color: #d1d5db;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        label i {
            margin-left: 0.4rem;
            color: #f7b32b;
        }

        input, select, textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 1rem;
            color: #f1f5f9;
            font-size: 0.9rem;
            transition: all 0.2s;
            font-family: 'Vazir', monospace;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #f7b32b;
            box-shadow: 0 0 0 2px rgba(247, 179, 43, 0.2);
        }

        textarea {
            resize: vertical;
            font-family: monospace;
        }

        .row2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }

        @media (max-width: 500px) {
            .row2 {
                grid-template-columns: 1fr;
            }
        }

        button {
            width: 100%;
            background: linear-gradient(90deg, #f0a500, #f7b32b);
            border: none;
            padding: 0.9rem;
            border-radius: 2.5rem;
            font-weight: bold;
            font-size: 1rem;
            color: #0f172a;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 0.5rem;
            font-family: 'Vazir', monospace;
        }

        button:hover:not(:disabled) {
            transform: scale(1.01);
            box-shadow: 0 0 15px rgba(247, 179, 43, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .progress-card {
            background: #0f172a;
            border-radius: 1rem;
            padding: 1rem;
            margin-top: 1.5rem;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            color: #f7b32b;
            font-size: 0.8rem;
        }

        .progress-bar {
            background: #1e293b;
            border-radius: 1rem;
            height: 0.5rem;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, #f0a500, #f7b32b);
            width: 0%;
            height: 100%;
            border-radius: 1rem;
            transition: width 0.3s ease;
        }

        .download-block {
            text-align: center;
            margin-top: 1rem;
            padding: 0.8rem;
            background: #a5dc86;
            border-radius: 1rem;
        }

        .download-block a {
            display: inline-block;
            background: #3dc032;
            color: #0f172a;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            text-decoration: none;
            font-weight: bold;
            margin-top: 0.5rem;
        }

        .error-block {
            text-align: center;
            color: #f87171;
            font-size: 0.8rem;
            margin-top: 0.8rem;
        }

        .limit-badge {
            text-align: center;
            font-size: 0.7rem;
            color: #6b7280;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #2d3748;
        }

        footer {
            text-align: center;
            color: #4b5563;
            font-size: 0.7rem;
            margin-top: 1.5rem;
        }

        .text-accent {
            color: #f7b32b;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>🎬 Khashayar Downloader</h1>
        <div class="sub">دانلود ویدیو از یوتیوب — ساده و سریع</div>

        <form id="downloadForm">
            <div class="form-group">
                <label><i class="fab fa-youtube"></i> لینک یوتیوب</label>
                <textarea id="urlInput" rows="2" placeholder="https://youtu.be/...&#10;https://www.youtube.com/watch?v=..." required></textarea>
            </div>

            <div class="row2">
                <div class="form-group">
                    <label><i class="fas fa-video"></i> کیفیت</label>
                    <select id="quality">
                        <option value="best">✨ بهترین (1080p+)</option>
                        <option value="2160">4K (2160p)</option>
                        <option value="1440">1440p (2K)</option>
                        <option value="1080">1080p Full HD</option>
                        <option value="720">720p HD</option>
                        <option value="480">480p</option>
                        <option value="audio">🎵 MP3 (فقط صدا)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-language"></i> زیرنویس</label>
                    <select id="subtitles">
                        <option value="false">خاموش</option>
                        <option value="true">روشن (فارسی + انگلیسی)</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label><i class="fas fa-lock"></i> رمز ZIP (اختیاری)</label>
                <input type="text" id="password" placeholder="در صورت نیاز رمز عبور">
            </div>

            <button type="submit" id="submitBtn">
                <i class="fas fa-download"></i> شروع دانلود
            </button>
        </form>

        <div id="progressBox" style="display: none;">
            <div class="progress-card">
                <div class="progress-header">
                    <span id="statusMsg"><i class="fas fa-spinner fa-pulse"></i> در حال ارسال...</span>
                    <span id="percentLabel">0%</span>
                </div>
                <div class="progress-bar">
                    <div id="progressFill" class="progress-fill" style="width: 0%;"></div>
                </div>
                <div id="downloadBlock" style="display: none;" class="download-block">
                    <div><i class="fas fa-check-circle"></i> ویدیو آماده است!</div>
                    <a id="directDownloadLink" href="#" target="_blank"><i class="fas fa-download"></i> دانلود فایل</a>
                    <button type="button" id="resetBtn" style="margin-top: 0.5rem; background: #95c977; padding: 0.4rem 1rem; font-size: 0.8rem;">جدید</button>
                </div>
                <div id="errorBlock" style="display: none;" class="error-block"></div>
            </div>
        </div>

        <div class="limit-badge">
            <i class="fas fa-info-circle"></i> هر کاربر حداکثر ۱۰ درخواست در ساعت | فایل‌ها ۵ دقیقه پس از دانلود حذف می‌شوند
        </div>
    </div>

    <footer>
        ساخته شده با ❤️ توسط Khashayar.one
    </footer>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.8.0/axios.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.15.10/sweetalert2.all.min.js"></script>

<script>
    const API_URL = 'https://khashayar.one/api/trigger.php';
    let pollingInterval = null;
    let currentRunId = null;

    // DOM elements
    const form = document.getElementById('downloadForm');
    const submitBtn = document.getElementById('submitBtn');
    const progressBox = document.getElementById('progressBox');
    const progressFill = document.getElementById('progressFill');
    const percentLabel = document.getElementById('percentLabel');
    const statusMsg = document.getElementById('statusMsg');
    const downloadBlock = document.getElementById('downloadBlock');
    const directLink = document.getElementById('directDownloadLink');
    const errorBlock = document.getElementById('errorBlock');
    const resetBtn = document.getElementById('resetBtn');
    const urlInput = document.getElementById('urlInput');
    const qualitySelect = document.getElementById('quality');
    const subtitlesSelect = document.getElementById('subtitles');
    const passwordInput = document.getElementById('password');

    // Helper functions
    function showError(msg) {
        errorBlock.innerHTML = `<i class="fas fa-exclamation-triangle"></i> ${msg}`;
        errorBlock.style.display = 'block';
        downloadBlock.style.display = 'none';
        statusMsg.innerHTML = '<i class="fas fa-times-circle"></i> خطا';
        if (pollingInterval) clearInterval(pollingInterval);
        submitBtn.disabled = false;
        
        Swal.fire({
            icon: 'error',
            title: 'خطا',
            text: msg,
            background: '#1e293b',
            color: '#fff',
            confirmButtonColor: '#f7b32b'
        });
    }

    function resetUI() {
        if (pollingInterval) clearInterval(pollingInterval);
        currentRunId = null;
        progressBox.style.display = 'none';
        downloadBlock.style.display = 'none';
        errorBlock.style.display = 'none';
        progressFill.style.width = '0%';
        percentLabel.innerText = '0%';
        submitBtn.disabled = false;
    }

    async function triggerDownload(payload) {
        const response = await axios.post(API_URL, payload, {
            headers: { 'Content-Type': 'application/json' },
            timeout: 30000
        });
        
        if (!response.data) throw new Error('پاسخ نامعتبر از سرور');
        if (response.data.error) throw new Error(response.data.error);
        if (!response.data.run_id) throw new Error('شناسه درخواست دریافت نشد');
        
        return response.data.run_id;
    }

    async function checkStatus(runId) {
        try {
            const response = await axios.get(`${API_URL}?run_id=${runId}`, { timeout: 10000 });
            return response.data;
        } catch {
            return null;
        }
    }

    function startPolling(runId) {
        if (pollingInterval) clearInterval(pollingInterval);
        
        let lastPercent = 0;
        
        pollingInterval = setInterval(async () => {
            const status = await checkStatus(runId);
            if (!status) return;
            
            // Update progress based on status
            let percent = 10;
            if (status.status === 'queued') percent = 15;
            else if (status.status === 'in_progress') percent = 50;
            else if (status.status === 'completed') percent = 100;
            
            if (percent !== lastPercent) {
                progressFill.style.width = `${percent}%`;
                percentLabel.innerText = `${percent}%`;
                lastPercent = percent;
            }
            
            // Update status message
            let msg = status.message || 'در حال پردازش...';
            if (status.status === 'queued') msg = '⏳ در صف انتظار...';
            else if (status.status === 'in_progress') msg = '⬇️ در حال دانلود...';
            statusMsg.innerHTML = `<i class="fas fa-spinner fa-pulse"></i> ${msg}`;
            
            // Check if completed
            if (status.status === 'completed') {
                clearInterval(pollingInterval);
                
                if (status.success && status.download_url) {
                    // Success!
                    directLink.href = status.download_url;
                    downloadBlock.style.display = 'block';
                    statusMsg.innerHTML = '<i class="fas fa-check-circle"></i> ✅ دانلود کامل شد!';
                    progressFill.style.width = '100%';
                    percentLabel.innerText = '100%';
                    
                    Swal.fire({
                        icon: 'success',
                        title: 'دانلود کامل شد!',
                        text: 'ویدیو آماده دریافت است',
                        background: '#1e293b',
                        color: '#fff',
                        confirmButtonColor: '#f7b32b',
                        timer: 3000
                    });
                    
                    submitBtn.disabled = false;
                } else {
                    showError(status.error || 'خطا در دانلود ویدیو');
                }
            }
        }, 4000);
    }

    // Form submit
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        resetUI();
        
        const urlsRaw = urlInput.value.trim();
        if (!urlsRaw) {
            Swal.fire({
                icon: 'warning',
                title: 'لطفاً لینک یوتیوب را وارد کنید',
                background: '#1e293b',
                color: '#fff',
                confirmButtonColor: '#f7b32b'
            });
            return;
        }
        
        const urlList = urlsRaw.split(/\r?\n/).filter(u => u.trim().length > 0);
        const payload = {
            youtube_urls: urlList.join(' '),
            quality: qualitySelect.value,
            download_subtitles: subtitlesSelect.value === 'true',
            password: passwordInput.value.trim()
        };
        
        submitBtn.disabled = true;
        progressBox.style.display = 'block';
        statusMsg.innerHTML = '<i class="fas fa-paper-plane"></i> 🚀 ارسال درخواست...';
        progressFill.style.width = '5%';
        percentLabel.innerText = '5%';
        
        try {
            const runId = await triggerDownload(payload);
            currentRunId = runId;
            startPolling(runId);
        } catch (err) {
            showError(err.message || 'خطا در ارتباط با سرور');
            submitBtn.disabled = false;
        }
    });
    
    // Reset button
    resetBtn.addEventListener('click', () => {
        resetUI();
        form.reset();
        submitBtn.disabled = false;
        urlInput.focus();
    });
</script>
</body>
</html>
